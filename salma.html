<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Salma 🎉</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("96isSZef8FuHKGU-o");
})();
</script>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;

background: linear-gradient(270deg,#ff9a9e,#fad0c4,#a18cd1,#fbc2eb);
background-size:800% 800%;
animation:gradientBG 15s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1,#name,#msg{
text-shadow:2px 2px 10px black;
}

h1{
margin-top:70px;
font-size:60px;
}

#name{
font-size:55px;
margin-top:20px;
display:none;
}

.gift{
font-size:120px;
cursor:pointer;
margin-top:40px;
}

#msg{
font-size:28px;
display:none;
margin-top:20px;
white-space:pre-wrap;
}

#cake{
font-size:120px;
display:none;
cursor:pointer;
margin-top:20px;
}

#wishBox{
display:none;
margin-top:20px;
z-index:30;
position:relative;
}

#wishText{
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
width:260px;
}

#wishBtn{
padding:10px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4da6;
color:white;
cursor:pointer;
}

#wishMessage{
display:none;
font-size:28px;
margin-top:20px;
}

#password-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
z-index:50;
flex-direction:column;
}

#password-box{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:15px;
}

#password-box input{
padding:10px 20px;
font-size:18px;
border-radius:8px;
border:none;
}

#password-box button{
padding:10px 25px;
font-size:18px;
border:none;
border-radius:8px;
background:#ff5fa2;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="password-screen">
<div id="password-box">

<h2>ادخل كلمة السر لفتح المفاجأة 🎁</h2>

<input type="password" id="user-pass">

<br><br>

<button onclick="checkPassword()">Enter</button>

</div>
</div>

<h1>🎉 Happy Birthday 🎉</h1>

<div id="name"></div>

<div class="gift" onclick="openGift()">🎁</div>

<div id="msg"></div>

<div id="cake" onclick="blow()">🎂</div>

<div id="wishBox">

<h2>✨ Write your birthday wish ✨</h2>

<input id="wishText" placeholder="Type your wish here...">

<br><br>

<button id="wishBtn" onclick="sendWish()">Send Wish 💌</button>

</div>

<div id="wishMessage">
✨ Your wish has been sent ❤️ ✨
</div>

<audio id="music" src="birthday_song.mp3"></audio>

<script>

const password="1632006";

function checkPassword(){

let input=document.getElementById("user-pass").value;

if(input===password){

document.getElementById("password-screen").style.display="none";

}else{

alert("كلمة السر غلط");

}

}

let romanticText=`عيد ميلاد أجمل حاجة حصلتلي في حياتي ❤️

النهارده مش يوم عادي… ده اليوم اللي الدنيا نورت فيه علشان تنور حياتي بعدها. وجودك معايا مش صدفة، ده نعمة بشكر ربنا عليها كل يوم.

كل سنة وإنتِ قريبة مني كده، وضحكتك مالية حياتي، وقلبك مطمني مهما الدنيا لفت بينا.
كل سنة وإنتِ روحي اللي بتهدى لما أكون تايه، وأماني اللي بحس بيها حتى من غير كلام.

أتمنى سنتك الجديدة تكون مليانة فرح قد ما بتفرحيني، ونجاح قد ما تفخري بيا، وحب قد ما قلبي شايله ليكي.
وأهم أمنية ليا في يومك ده… إنك تفضلي دايمًا جنبي، ونكبر سوا سنة ورا سنة ❤️

عيد ميلاد سعيد يا أجمل هدية في عمري 🎂✨`;

let iName=0;
let iMsg=0;

function typeName(){

let nameDiv=document.getElementById("name");
let text="❤️ SALMA ❤️";

if(iName<text.length){

nameDiv.innerHTML+=text.charAt(iName);

iName++;

setTimeout(typeName,150);

}

}

function typeMessage(){

let msgDiv=document.getElementById("msg");

if(iMsg<romanticText.length){

msgDiv.innerHTML+=romanticText.charAt(iMsg);

iMsg++;

setTimeout(typeMessage,30);

}

}

function openGift(){

document.querySelector(".gift").style.display="none";

document.getElementById("cake").style.display="block";

document.getElementById("music").play();

document.getElementById("name").style.display="block";

document.getElementById("msg").style.display="block";

typeName();

typeMessage();

}

function blow(){

document.getElementById("cake").innerHTML="🎂✨";

document.getElementById("wishBox").style.display="block";

}

function sendWish(){

let wish=document.getElementById("wishText").value;

if(wish.trim()===""){

alert("Write your wish first 😊");

return;

}

emailjs.send("Mo7amed","template_cxwjth4",{

wish_message:wish

}).then(function(){

document.getElementById("wishBox").style.display="none";

document.getElementById("wishMessage").style.display="block";

},function(){

alert("Error sending wish");

});

}

</script>

</body>
</html>
