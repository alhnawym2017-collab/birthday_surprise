<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Birthday iPhone 15</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){ emailjs.init("96isSZef8FuHKGU-o"); })();
</script>

<style>
/* Body + Background */
body {
  margin: 0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(270deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
  background-size: 800% 800%;
  animation: gradientBG 15s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}
@keyframes gradientBG{
0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}
}

/* Password screen */
#password-screen{
position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.7);
display:flex; flex-direction:column; justify-content:center; align-items:center;
z-index:50;
}
#password-box{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
text-align:center;
backdrop-filter: blur(10px);
}
#password-box input{padding:12px 20px;font-size:18px;border-radius:10px;border:none;margin-top:10px;}
#password-box button{padding:12px 25px;font-size:18px;border-radius:10px;border:none;background:#ff5fa2;color:white;cursor:pointer;margin-top:15px;}

/* iPhone 15 Frame */
.phone{
width:390px;height:844px;background: linear-gradient(145deg,#e0e0e0,#f7f7f7);
border-radius:55px;padding:12px;
box-shadow:0 40px 100px rgba(0,0,0,0.7);
position:relative;transform-style:preserve-3d;display:none;transition:transform 0.2s;
animation:openApp 0.7s ease;
border: 2px solid #ccc;
}

/* Notch / Dynamic Island */
.island{
position:absolute;top:10px;left:50%;transform:translateX(-50%);
width:130px;height:35px;background: linear-gradient(135deg,#333,#111);
border-radius:25px;box-shadow:0 2px 6px rgba(255,255,255,0.2);z-index:10;
}

/* Screen */
.screen{
background:rgba(255,255,255,0.15); width:100%; height:100%; border-radius:45px;
backdrop-filter: blur(20px); box-shadow: inset 0 0 50px rgba(255,255,255,0.2);
overflow:hidden; display:flex; flex-direction:column;
}

/* Status Bar */
.status{display:flex;justify-content:space-between;padding:8px 18px;font-size:14px;font-weight:600;}

/* Header */
.header{background:#ff4da6;color:white;padding:16px;text-align:center;font-weight:600;font-size:20px;border-radius:15px;}

/* Content */
.content{flex:1;text-align:center;padding:20px;overflow:auto;}
.gift{font-size:90px;cursor:pointer;transition:.3s;}
.gift:hover{transform:scale(1.2);}
#cake{font-size:90px;display:none;cursor:pointer;}
#name{font-size:34px;font-weight:600;display:none;color:white;text-shadow:2px 2px 10px #ff4da6;}
#msg{font-size:18px;margin-top:10px;display:none;white-space:pre-wrap;color:white;text-shadow:1px 1px 5px black;}

/* Cards */
.card{background: rgba(255,255,255,0.1); border-radius:25px; padding:20px; box-shadow:0 20px 60px rgba(0,0,0,0.4); backdrop-filter:blur(10px); transition: transform 0.2s;}

/* Input / Button */
input{padding:12px;width:80%;border-radius:12px;border:1px solid #ddd;font-family:'Poppins';margin-top:10px;}
button{margin-top:10px;padding:12px 20px;border:none;border-radius:12px;background:#ff4da6;color:white;font-weight:600;cursor:pointer;transition:0.2s;}
button:hover{transform:scale(1.05);}

/* Animation */
@keyframes openApp{0%{transform:scale(0.5) translateY(100px);opacity:0;}100%{transform:scale(1) translateY(0);opacity:1;}}

/* Hearts floating */
.heart{position:absolute;color:#ff4da6;animation:float 6s linear infinite;font-size:25px;}
@keyframes float{0%{transform:translateY(100vh);opacity:0;}50%{opacity:1;}100%{transform:translateY(-10vh);opacity:0;}}

/* Typewriter glow */
.typewriter span{display:inline-block;animation: glow 1s infinite alternate;}
@keyframes glow{0%{text-shadow:0 0 2px #fff;}100%{text-shadow:0 0 12px #ff4da6,0 0 20px #fad0c4;}}
</style>
</head>
<body>

<!-- Password screen -->
<div id="password-screen">
<div id="password-box">
<h2>ادخل كلمة السر لفتح المفاجأة 🎁</h2>
<input type="password" id="user-pass" placeholder="Password">
<br>
<button onclick="checkPassword()">Enter</button>
</div>
</div>

<!-- iPhone -->
<div class="phone">
<div class="island"></div>
<div class="screen">
<div class="status"><span>9:41</span><span>📶 🔋</span></div>
<div class="header">Birthday Surprise 🎉</div>
<div class="content">
<h2>Happy Birthday</h2>
<div id="name"></div>
<div class="gift" onclick="openGift()">🎁</div>
<div id="cake" onclick="blow()">🎂</div>
<div id="msg"></div>
<br>
<input id="wishText" placeholder="Write your wish">
<br>
<button onclick="sendWish()">Send Wish 💌</button>
</div>
</div>
</div>

<audio id="music" src="birthday_song.mp3" loop></audio>

<script>
const phone=document.querySelector(".phone");
const music=document.getElementById("music");
const nameDiv=document.getElementById("name");
const msgDiv=document.getElementById("msg");
let opened=false;

// كلمة السر
const password="1632006";
function checkPassword(){
  let input=document.getElementById("user-pass").value;
  if(input===password){document.getElementById("password-screen").style.display="none";phone.style.display="block";}else{alert("كلمة السر غلط");}
}

// Typewriter glow
function typeWriter(el,text){
  el.innerHTML="";
  let i=0;
  function frame(){if(i<text.length){el.innerHTML+=text.charAt(i); i++; requestAnimationFrame(frame);}}
  frame();
}

// فتح الهدايا
function openGift(){
if(opened) return;
opened=true;
document.querySelector(".gift").style.display="none";
document.getElementById("cake").style.display="block";
nameDiv.style.display="block";
msgDiv.style.display="block";
music.play().catch(()=>{});
typeWriter(nameDiv,"❤️ SALMA ❤️");
typeWriter(msgDiv,`عيد ميلاد سعيد يا أجمل حاجة في حياتي ❤️
Happy Birthday Salma 🎂
أتمنى لك سنة مليانة حب وسعادة ✨`);

// Confetti داخلي + خارجي
for(let i=0;i<7;i++){confetti({particleCount:100,spread:160,origin:{x:Math.random(),y:Math.random()*0.6}});}
}

// التورتة
function blow(){
document.getElementById("cake").innerHTML="🎂✨";
for(let i=0;i<7;i++){confetti({particleCount:100,spread:160,origin:{x:Math.random(),y:Math.random()*0.6}});}
}

// إرسال الأمنية async
async function sendWish(){
let wish=document.getElementById("wishText").value;
if(wish.trim()==""){alert("Write your wish first!"); return;}
let btn=document.querySelector("button[onclick='sendWish()']");
btn.disabled=true; btn.innerText="Sending... 💌";
try{await emailjs.send("Mo7amed","template_cxwjth4",{wish_message:wish});
alert("Wish Sent ❤️"); document.getElementById("wishText").value="";}
catch(err){console.error(err);alert("Error sending wish");}
finally{btn.disabled=false; btn.innerText="Send Wish 💌";}
}

// Hearts floating
const heartsPool=[];
for(let i=0;i<20;i++){let heart=document.createElement("div");heart.className="heart";heart.innerHTML="❤️";heart.style.display="none";document.body.appendChild(heart);heartsPool.push(heart);}
function floatHeart(){let heart=heartsPool[Math.floor(Math.random()*heartsPool.length)];heart.style.display="block";heart.style.left=Math.random()*100+"vw";heart.style.fontSize=(Math.random()*20+25)+"px";setTimeout(()=>{heart.style.display="none"},5000);}
setInterval(floatHeart,300);

// confetti مستمر 24/7
setInterval(()=>{confetti({particleCount:20,spread:120,origin:{x:Math.random(),y:Math.random()*0.6}});},200);

// تحريك 3D سلس للهاتف
let lastMove=0;
document.addEventListener("mousemove",(e)=>{if(Date.now()-lastMove<50)return;lastMove=Date.now();let x=(window.innerWidth/2 - e.pageX)/20;let y=(window.innerHeight/2 - e.pageY)/20;phone.style.transform=`rotateY(${x}deg) rotateX(${-y}deg) scale(1.02)`;});

// confetti عند اللمس للشاشة
document.addEventListener('touchstart', e=>{const touch=e.touches[0];confetti({particleCount:30,origin:{x: touch.clientX/window.innerWidth,y: touch.clientY/window.innerHeight}});});
</script>
</body>
</html>
